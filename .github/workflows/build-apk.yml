name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Android klasörünü oluştur
        run: flutter create --platforms=android .

      - name: Kotlin sürümünü güncelle
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/' android/build.gradle
          sed -i 's/org.jetbrains.kotlin.android" version "[^"]*"/org.jetbrains.kotlin.android" version "1.9.0"/' android/settings.gradle
          cat android/build.gradle | grep kotlin || true
          cat android/settings.gradle | grep kotlin || true

      - name: Bağımlılıkları indir
        run: flutter pub get

      - name: Release APK derle
        run: flutter build apk --release

      - name: APK'yı yükle (indirilebilir hale getir)
        uses: actions/upload-artifact@v4
        with:
          name: block-puzzle-apk
          path: build/app/outputs/flutter-apk/app-release.apk
