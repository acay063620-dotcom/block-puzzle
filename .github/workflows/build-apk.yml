name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Android klasörünü oluştur (eksikse)
        run: flutter create --platforms=android --project-name=block_puzzle .

      - name: Bağımlılıkları indir
        run: flutter pub get

      - name: Release APK derle
        run: flutter build apk --release

      - name: APK'yı yükle (indirilebilir hale getir)
        uses: actions/upload-artifact@v4
        with:
          name: block-puzzle-apk
          path: build/app/outputs/flutter-apk/app-release.apk
