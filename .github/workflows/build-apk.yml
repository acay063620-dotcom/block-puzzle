name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Android klasörünü oluştur
        run: flutter create --platforms=android .

      - name: Kotlin sürümünü güncelle
        run: |
          find . -name "*.gradle" -not -path "*/build/*" \
            -exec sed -i 's/ext.kotlin_version = "[^"]*"/ext.kotlin_version = "1.9.0"/g' {} \;
          find . -name "*.gradle" -not -path "*/build/*" \
            -exec sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.0"/g' {} \;
          find . -name "*.gradle" -not -path "*/build/*" | xargs grep -l "kotlin" 2>/dev/null || true

      - name: Bağımlılıkları indir
        run: flutter pub get

      - name: Release APK derle
        run: flutter build apk --release

      - name: APK'yı yükle (indirilebilir hale getir)
        uses: actions/upload-artifact@v4
        with:
          name: block-puzzle-apk
          path: build/app/outputs/flutter-apk/app-release.apk
